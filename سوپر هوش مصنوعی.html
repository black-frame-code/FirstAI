<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چت‌بات هوشمند فارسی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            width: 100%;
            height: 100%;
            color: #333;
            line-height: 1.6;
            padding-bottom: 110px;
            overflow-x: hidden;
            background: hsl(0deg 0% 15%);
        }

        .chat-container {
            width: 90%;
            margin: 20px auto 20px;
            max-width: 870px;
            padding: 0;
        }

        .message {
            display: flex;
            margin: 15px 0;
            animation: msgAnim .3s ease;
        }

        .message.user {
            justify-content: flex-start;
        }

        .message.user .bubble {
            border-bottom-right-radius: 5px;
        }

        .message.bot {
            justify-content: flex-end;
        }

        .message.bot .bubble {
            border-bottom-left-radius: 5px;
            max-width: 85%;
        }

        .bubble,
        .code-box {
            max-width: 70%;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            word-break: break-word;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            animation: fadeInGlow 1s ease-out;
            background: rgb(0 0 0 / 0%);
            border: 2px solid rgb(255 255 255 / 25%);
            backdrop-filter: blur(25px);
            text-shadow: 0 0 10px #000000;
            display: flex;
            flex-direction: column;
        }

        .code-box {
            width: fit-content;
            margin-top: 15px;
            align-items: center;
        }

        .bubble .bubble {
            animation: none;
        }

        .bubble.thinking {
            background: #e2e8f0;
            font-style: italic;
            color: #718096;
        }

        .time,
        .code {
            font-size: .75rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        .code {
            border-top: 2px solid rgb(255 255 255 / 40%);
            padding-top: 5px;
        }

        .time a {
            color: #ffffff;
        }

        .input-container {
            position: fixed;
            bottom: 10px;
            left: 0px;
            right: 0px;
            width: 90%;
            padding: 15px 25px;
            box-shadow: 0 -4px 20px rgb(0 0 0 / 10%);
            z-index: 100;
            backdrop-filter: blur(25px);
            animation: fadeInGlow 1s ease-out;
            border-radius: 1.8rem;
            max-width: 870px;
            border: 2px solid rgb(255 255 255 / 25%);
            margin: auto;
            display: flex;
            gap: 10px;
            flex-direction: row;
            justify-content: center;
        }

        .div-box {
            display: flex;
            gap: 10px;
            flex-direction: row;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 2px solid rgb(255 255 255 / 25%);
            padding-top: 10px;
            margin-top: 10px;
        }

        .bubble::before,
        .input-container::before {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: calc(1.8rem + 5px);
            background: linear-gradient(135deg, hwb(158deg 0% 75% / 50%), hwb(0deg 0% 75% / 50%));
            z-index: -1;
            filter: blur(10px);
        }

        .bubble::before {
            background: linear-gradient(135deg, hwb(0deg 0% 100% / 75%), hwb(0deg 0% 100% / 85%), hwb(0deg 0% 100% / 75%));
        }

        @keyframes fadeInGlow {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #userInput {
            flex: 1;
            padding: 14px 20px;
            background: rgb(255 255 255 / 10%);
            border: 2px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgb(0 0 0 / 10%);
            min-width: 60%;
            max-width: 600px;
            border-radius: 0 50px 50px 50px;
            font-size: 1rem;
            outline: none;
            transition: all .3s;
            color: white;
        }

        #userInput:focus,
        .button:focus {
            border-color: #ffffff;
        }

        .button {
            background: rgb(255 255 255 / 20%);
            border: 2px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgb(0 0 0 / 10%);
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            width: 55px;
            height: 55px;
            border-radius: 50% 0% 50% 50%;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all .3s;
        }

        .button:hover {
            transform: scale(1.05);
        }

        #userInput:active,
        .button:active {
            transform: scale(.97);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 10px rgb(0 0 0 / 85%);
        }

        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #667eea;
            margin-left: 3px;
            animation: blink .6s infinite;
        }

        @keyframes msgAnim {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .loading {
            position: fixed;
            inset: 0;
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading.hide {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>

<body>
    <div class="loading" id="loader">
        <h1>Loading</h1>
    </div>
    <div class="chat-container">
        <div class="bubble">
            تعداد مکالمات فعلی:
            <div id="totalConv"></div>
            تعداد الگو های کشف شده:
            <div id="patterns"></div>
            تعداد هم معنی‌ها و واژگان یاد گرفته شده:
            <div id="vocab"></div>
            درصد قدرت
            <div id="accuracy"></div>
            <div class="div-box">
                <button class="bubble" id="clearMessagesBtn">🧹 پاک کردن پیام‌ها</button>
                <button class="bubble" id="toggleLearnBtn">✅ یادگیری فعال</button>
                <button class="bubble" id="clearLearnBtn">🧹 پاک کردن آموزش‌ها</button>
            </div>
        </div>
    </div>
    <div class="chat-container" id="chatContainer">
    </div>
    </div>
    <div class="input-container">
        <input type="text" id="userInput" placeholder="پیام خود را بنویسید..." autocomplete="off">
        <button id="sendBtn" class="button">➤</button>
    </div>
    <script>
        const loader = document.getElementById("loader");
        const minDisplayTime = 1000;
        const fadeDuration = 500;
        const startTime = Date.now();

        window.addEventListener("load", () => {
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, minDisplayTime - elapsed);

            setTimeout(() => {
                loader.classList.add("hide");

                setTimeout(() => {
                    loader.remove();
                }, fadeDuration);
            }, remaining);
        });
    </script>
    <script defer>
        const $ = id => document.getElementById(id);
        const LS = {
            get(k) {
                try { return JSON.parse(localStorage.getItem(k)) } catch (e) { return null }
            },
            set(k, v) { localStorage.setItem(k, JSON.stringify(v)) }
        };

        class ChatBot {
            constructor() {
                this.convs = LS.get('chatbot_convs') || [];
                this.data = LS.get('chatbot_data') || {
                    patterns: {},
                    convPatterns: []
                };
                this.enabled = LS.get('chatbot_enabled') !== false;
                this.defaults = this.getDefaults();
                this.updateStats();
                this.loadChats();
            }

            getDefaults() {
                return [
  { q: ['سلام', 'درود', 'وقت بخیر', 'سلام علیکم', 'سلام بچه ها'], a: 'سلام! خوش اومدی 😊 چطور می‌تونم کمکت کنم؟ اگه بگی دنبال چه کاری هستی (مثلاً نوشتن متن، ترجمه، ایده، برنامه‌ریزی، حل سوال، یا راهنمایی عمومی)، دقیق‌تر راهنمایی‌ات می‌کنم.' },
  { q: ['سلام حالت چطوره', 'چطوری', 'خوبی'], a: 'مرسی که پرسیدی! من خوبم 😊 تو چطوری؟ بگو امروز دوست داری درباره چی صحبت کنیم یا چه کمکی ازم برمیاد؟' },
  { q: ['حال میکنی', 'حال و احوال', 'حال و خوبی'], a: 'آره حالم خوبه 😊 حالا بگو چه کمکی لازم داری؟ می‌تونی موضوع رو خیلی کوتاه بگی تا سریع شروع کنیم.' },
  { q: ['بیا شروع کنیم', 'شروع کن', 'ادامه بده'], a: 'حتماً! آماده‌ام. فقط موضوعت رو بگو: چی می‌خوای بسازیم/حل کنیم/بنویسیم/فهم کنیم؟ اگر هم چند گزینه داری، همون‌ها رو لیست کن.' },
  { q: ['کمکم کن', 'کمک', 'کمک میخوام', 'لطفا کمک'], a: 'حتماً. مشکل یا سوالت چیه؟ اگر می‌تونی این ۳ مورد رو هم بگو: 1) هدفت چیه؟ 2) الان چی داری؟ 3) تا کجا پیش رفتی؟' },

  { q: ['خداحافظ', 'فعلا', 'بدرود', 'مرسی خداحافظ'], a: 'خدانگهدار! خوشحالم که کمک کردم 😊 هر وقت دوباره سوال داشتی، من در خدمتم.' },
  { q: ['می‌رم', 'دارم میرم', 'فعلا میام', 'بعدا میبینمت'], a: 'چشم 😊 هر وقت برگشتی در خدمتت هستم. امیدوارم روز خوبی داشته باشی.' },

  { q: ['ممنون', 'متشکرم', 'سپاس'], a: 'خواهش می‌کنم 😊 خیلی خوشحالم که مفید بودم. اگر دوست داشتی، بگو برای ادامه چه کمکی لازم داری.' },
  { q: ['مرسی خیلی', 'خیلی ممنون'], a: 'قربانت! خوشحالم که جواب داد 😊 اگر سوال دیگه‌ای هم داری، همینجا بپرس.' },
  { q: ['دمت گرم', 'دمت گرم'], a: 'اگه کمک کردم خوشحال شدم 😊 حالا بگو چه موضوعی مدنظرت هست؟' },

  { q: ['نامت چیه', 'تو کی هستی', 'اسم شما'], a: 'من یک دستیار هوش مصنوعی هستم و اینجا برای کمک به سوالات و کارهای روزمره در خدمتت هستم 😊 اگر بگی دقیقاً چی می‌خوای، همون رو انجام می‌دم.' },
  { q: ['چی هستی', 'تو چه کاری انجام میدی'], a: 'من می‌تونم بهت کمک کنم در: نوشتن متن، ایده‌پردازی، توضیح مفاهیم، خلاصه‌سازی، ترجمه، پاسخ به سوال‌های عمومی، ساخت قالب پیام، و حتی برنامه‌ریزی ساده برای کارها. فقط بگو دنبال چه چیزی هستی.' },

  { q: ['سوال دارم', 'می‌پرسم', 'یه سوال'], a: 'حتماً. سوالت رو بپرس 😊 اگه جزئیات بیشتری بدی (هدف، محدودیت‌ها، نمونه)، جواب دقیق‌تر و کامل‌تر می‌دم.' },
  { q: ['جواب بده', 'پاسخ', 'راهنمایی کن'], a: 'حتماً. لطفاً سوال/درخواستت رو کامل بنویس. اگر موضوع پیچیده است، بگو چه بخشی برات مبهمه تا دقیق همون بخش رو باز کنم.' },

  { q: ['عجیبه', 'نمی‌فهمم', 'متوجه نشدم'], a: 'اشکالی نداره 😊 دوباره و ساده‌تر توضیح می‌دم. اول بگو دقیقاً کدوم قسمت رو متوجه نشدی؟ بعد از اون، یک مثال هم می‌زنم تا کاملاً جا بیفته.' },
  { q: ['ساده‌ترش کن', 'خلاصه کن', 'کوتاه کن'], a: 'حتماً. می‌خوای خیلی خلاصه بگم یا با مثال؟ بگو کدوم سبک رو ترجیح می‌دی: ۱) تیترهای کوتاه، ۲) توضیح مرحله‌به‌مرحله، یا ۳) مثال واقعی.' },
  { q: ['جزئیات بیشتر', 'تفصیل بده'], a: 'حتماً. بگو درباره کدوم بخش جزئیات می‌خوای (تعاریف، روش انجام، مثال، نکات مهم، یا خطاهای رایج) تا همون‌ها رو مفصل‌تر کنم.' },

  { q: ['مثال بزن', 'نمونه', 'یه نمونه'], a: 'حتماً 😊 چند نمونه می‌زنم تا بهتر بفهمی. موضوعت چیه؟ اگر بگی درباره چه موردی مثال می‌خوای، دقیقاً همون زمینه رو مثال می‌زنم.' },
  { q: ['نمونه متن', 'نمونه جواب', 'نمونه پیام'], a: 'حتماً. برای اینکه بهترین متن رو بسازم، لطفاً بگو: 1) موضوع پیام چیه؟ 2) لحن رسمی/صمیمی؟ 3) مخاطب کیه؟ 4) هدف پیام (درخواست/اطلاع/دعوت/تشکر)؟' },

  { q: ['ترجمه کن', 'translate', 'ترجمه فارسی', 'ترجمه انگلیسی'], a: 'حتماً. متنت رو بفرست و بگو ترجمه رو به کدوم زبان می‌خوای. همچنین اگر لحن خاصی مدنظرت هست (رسمی/محاوره‌ای/ادبی)، بگو تا مطابق همون ترجمه کنم.' },
  { q: ['متن رو بهتر کن', 'ویرایش کن', 'ادیت کن'], a: 'حتماً 😊 متن رو بفرست. بگو: 1) رسمی می‌خوای یا خودمونی؟ 2) کوتاه‌تر یا دقیق‌تر؟ 3) مخاطب کیه؟ بعد نسخه‌ی اصلاح‌شده و (اگر خواستی) چند جایگزین هم می‌دم.' },

  { q: ['خلاصه کن', 'خلاصه مطلب', 'جمع‌بندی'], a: 'حتماً. متن/محتوا رو بفرست. بعد: ۱) خلاصه خیلی کوتاه، ۲) خلاصه با نکات کلیدی، و اگر خواستی ۳) نکات اقدام‌محور (چه کار باید کرد) رو هم می‌تونم آماده کنم.' },
  { q: ['جمع بندی کن', 'سخن آخر', 'نتیجه چی میشه'], a: 'چشم. اول بگو موضوع یا متن چی هست. بعد جمع‌بندی رو با چند بولت کلیدی و یک نتیجه روشن ارائه می‌دم.' },

  { q: ['ایده بده', 'پیشنهاد بده', 'Idea'], a: 'حتماً 😊 موضوع رو بگو (مثلاً برای محتوا، کسب‌وکار، پروژه، جمله/متن، یا تصمیم‌گیری). بعد چند ایده متفاوت با مزایا و پیشنهاد اجرای هرکدوم می‌دم.' },

  { q: ['برنامه‌ریزی کن', 'زمان‌بندی', 'برنامه'], a: 'حتماً. بگو چه کاری و برای چه مدت (مثلاً یک هفته/یک ماه) می‌خوای انجام بدی. همچنین محدودیت‌ها (ساعت‌ها، اولویت‌ها) رو بگو تا برنامه‌ی واقع‌بینانه بچینم.' },
  { q: ['طرح درس', 'برنامه آموزشی', 'پلن مطالعه'], a: 'حتماً. هدف یادگیری رو بگو (مثلاً زبان/امتحان/مهارت خاص) و سطح فعلی چیه. سپس یک برنامه مرحله‌ای با زمان‌بندی، منابع پیشنهادی، تمرین و پیگیری می‌چینم.' },

  { q: ['چطور شروع کنم', 'از کجا شروع کنم', 'begin'], a: 'برای شروع، اول هدف رو دقیق کنیم. لطفاً بگو هدفت چیه و الان چه شرایطی داری. بعد من یک مسیر کوتاه از «گام اول» تا «نتیجه قابل اندازه‌گیری» پیشنهاد می‌دم.' },
  { q: ['گام به گام', 'مرحله به مرحله', 'روش انجام'], a: 'حتماً مرحله‌به‌مرحله توضیح می‌دم 😊 فقط بگو موضوع دقیقا چیه (مثلاً نوشتن رزومه، تحقیق، تمرین، مکالمه، یا حل یک مسئله).' },

  { q: ['نکته مهم', 'توصیه', 'راهنمایی'], a: 'حتماً. بگو درباره چه چیزی نکته می‌خوای؟ اگر بگی سناریوت چیه (هدف، مخاطب، زمان)، توصیه‌ها دقیق و کاربردی می‌شن.' },

  { q: ['کد', 'برنامه نویسی', 'پایتون', 'جاوااسکریپت'], a: 'حتماً. اگر سوال برنامه‌نویسی داری، کد یا توضیح مسئله رو بفرست. بگو زبان چی هست، ورودی/خروجی چی باید باشه، و خطا یا رفتار فعلی چیه.' },
  { q: ['باگ دارم', 'خطا میده', 'error'], a: 'حتماً کمک می‌کنم. متن خطا (کپی دقیق) رو بفرست و بگو از کجا شروع کردی و انتظار داشتی چه اتفاقی بیفته.' },

  { q: ['چی کار کنم', 'help me', 'راهنما'], a: 'حتماً. شرایط رو تو چند خط بگو: چه چیزی می‌خوای، الان چی هست، و چه محدودیت‌هایی داری. بعد دقیقاً می‌گم چه کار کنی.' },

  { q: ['ساده توضیح بده', 'واضح بگو'], a: 'حتماً. یک توضیح ساده + یک مثال کوتاه می‌دم تا سریع واضح بشه. موضوعت چیه؟' },
  // 1
  {
    q: ['ساعت چنده', 'الان ساعت چنده', 'وقت چند است'],
    a: () => {
      const t = new Date().toLocaleTimeString('fa-IR');
      return `الان ساعت ${t} است.\n\nاین مقدار با استفاده از قابلیت تبدیل تاریخ/زمان جاوااسکریپت به فرمت محلیِ فارسی محاسبه شده است. اگر مرورگرتان زبان/منطقه را تغییر دهد، ممکن است فرمت نمایشی کمی فرق کند، اما زمان واقعی همان زمان سیستم کاربر است.`;
    }
  },
  // 2
  {
    q: ['تاریخ امروز چیه', 'امروز چه تاریخی است', 'چندم هستیم'],
    a: () => {
      const d = new Date().toLocaleDateString('fa-IR');
      return `امروز تاریخ ${d} است.\n\nاین تاریخ از روی تاریخ سیستم دستگاه شما گرفته می‌شود و با فرمت فارسی (fa-IR) نمایش داده شده است. اگر دستگاه شما روی تقویم/منطقه متفاوت تنظیم شده باشد، ممکن است نحوه نمایش کمی تغییر کند.`;
    }
  },
  // 3
  {
    q: ['روز هفته امروز', 'امروز چه روزی است', 'روز چندم هفته است'],
    a: () => {
      const w = new Date().toLocaleDateString('fa-IR', { weekday: 'long' });
      return `امروز ${w} است.\n\nاین عبارت بر اساس نام روز هفته در خروجی محلیِ فارسی ساخته شده است و به همین دلیل می‌تواند با زبان/لوکال دستگاه هم‌خوان باشد.`;
    }
  },
  // 4
  {
    q: ['تایم زونت چیه', 'منطقه زمانی چیه', 'ساعت محلی بر چه مبناییه'],

                        existing.lastUsed = Date.now();

                        responses: [resp],
                        respFreq: { [resp]: 1 },
                        respLastUsed: { [resp]: Date.now() },
                        freq: 1,
                        lastUsed: Date.now(),
                        _embedding: this.getEmbedding(inp)

                    input: inp,
                    response: resp,
                    time: Date.now(),
                    embedding: this.getEmbedding(inp)

            partialMatchResponse(inp, inputWords) {

                for (const [pattern, data] of Object.entries(this.data.patterns)) {
                    const patternWords = pattern.split(/\s+/).filter(w => w.length > 0);
                    let matchCount = 0, patternMatchCount = 0;
                    for (const word of inputWords) {
                        if (patternWords.some(pw => pw.includes(word) || word.includes(pw))) matchCount++;
                    }
                    for (const pw of patternWords) {
                        if (inputWords.some(w => w.includes(pw) || pw.includes(w))) patternMatchCount++;
                    }
                    const maxLen = Math.max(inputWords.length, patternWords.length);
                    const score = maxLen > 0 ? (matchCount + patternMatchCount) / (2 * maxLen) : 0;
                    if (score > bestScore && score > 0.4) {
                        bestScore = score;
                        let bestFreq = 0;
                        for (const resp of data.responses) {
                            const freq = data.respFreq?.[resp] || 1;
                            if (freq > bestFreq) { bestFreq = freq; bestResp = resp; }
                        }
                    }
                }
                return bestResp;

                const recent = this.data.convPatterns.slice(-5);

                const inputEmb = this.getEmbedding(input);
                let bestContextResponse = null, maxContextSim = 0;
                for (const c of recent) {
                    const cEmb = c.embedding || this.getEmbedding(c.input);
                    const sim = this.cosineSimilarity(inputEmb, cEmb);
                    const words = this.preprocess(input).split(/\s+/).filter(w => w.length > 0);
                    const ctxThreshold = this.getDynamicThreshold(words.length) * 0.7;

                            const simToContext = this.cosineSimilarity(cEmb, patEmb);

                            for (const [pat, data] of relatedPatterns) {

                this.convs = [];
                LS.set('chatbot_convs', this.convs);
                this.loadChats();
                this.updateStats();
            }

            toggleLearn() {
                this.enabled = !this.enabled;
                LS.set('chatbot_enabled', this.enabled);
                this.updateStats();
                alert(`یادگیری ${this.enabled ? 'فعال' : 'غیرفعال'} شد.`);
            }
        }

        const bot = new ChatBot();

        $('sendBtn').onclick = () => send();
        $('userInput').onkeydown = e => { if (e.key === 'Enter') send(); };
        $('clearLearnBtn').onclick = () => { if (confirm('پاک شود؟')) bot.clearLearning(); };
        $('clearMessagesBtn').onclick = () => { if (confirm('پیام‌ها پاک شوند؟')) bot.clearMessages(); };
        $('toggleLearnBtn').onclick = () => bot.toggleLearn();

        async function send() {
            const inp = $('userInput');
            const text = inp.value.trim();
            if (!text) return;
            inp.value = '';
            bot.addMessage('user', text);
            bot.loadChats();
            showThinking();
            const resp = bot.generateResponse(text);
            bot.learn(text, resp);
            await typeResponse(resp);
        }

        function showThinking() {
            const c = $('chatContainer');
            const d = document.createElement('div');
            d.className = 'message bot';
            d.id = 'thinkingMsg';
            d.innerHTML = '<div class="bubble thinking">🧠 فکر کردن <span class="typing-cursor"></span></div>';
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        async function typeResponse(fullText) {
            const thinking = $('thinkingMsg');
            if (thinking) thinking.remove();
            const c = $('chatContainer');
            const d = document.createElement('div');
            d.className = 'message bot';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            d.appendChild(bubble);
            c.appendChild(d);
            const words = fullText.split(' ');
            let idx = 0, shown = '';
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'typing-cursor';
            bubble.appendChild(cursorSpan);
            await new Promise(resolve => {
                const interval = setInterval(() => {
                    if (idx < words.length) {
                        shown += (idx ? ' ' : '') + words[idx];
                        idx++;
                        bubble.innerHTML = shown;
                        bubble.appendChild(cursorSpan);
                        c.scrollTop = c.scrollHeight;
                    } else {
                        clearInterval(interval);
                        cursorSpan.remove();
                        const timeDiv = document.createElement('div');
                        timeDiv.className = 'time';
                        timeDiv.textContent = new Date().toLocaleTimeString('fa-IR');
                        bubble.appendChild(timeDiv);
                        bot.addMessage('bot', fullText, timeDiv.textContent);
                        resolve();
                    }
                }, 120);
            });
        }

        bot.loadChats();
        if (!bot.convs.length) {
            setTimeout(() => {
                bot.addMessage('bot', 'سلام! من یک چت‌بات هوشمند هستم. میتونم از شما یاد بگیرم و پیشرفته‌تر شوم. هر سوالی دارید بپرسید.');
                bot.loadChats();
            }, 300);
        }
    </script>
</body>

</html>
